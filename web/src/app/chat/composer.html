<form class="composer" (submit)="$event.preventDefault(); submit()">
  <textarea
    #box
    name="message"
    rows="1"
    placeholder="Ask me anything…"
    aria-label="Your message"
    [value]="draft()"
    (input)="onInput($event)"
    (keydown)="onKeydown($event)"
  ></textarea>
  <button type="submit" [disabled]="disabled() || !draft().trim()">
    Send
  </button>
</form>
